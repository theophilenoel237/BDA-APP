<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Platform - Who are you ?</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="content">
        
        <!-- Section Who are you ? -->
        <div class="who-section">
            <div class="who-header">
                <h2>Who are you ?</h2>
                <p>Choose your role to get started</p>
            </div>

            <div class="roles-grid">
                <!-- Visitor -->
                <div class="role-card">
                    <div class="icon-circle visitor">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3>Visitor</h3>
                    <p>Browse content as a guest</p>
                </div>

                <!-- Student -->
                <div class="role-card">
                    <div class="icon-circle student">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <h3>Student</h3>
                    <p>Learn and track your progress</p>
                </div>

                <!-- Parent -->
                <div class="role-card">
                    <div class="icon-circle parent">
                        <i class="fas fa-users"></i>
                    </div>
                    <h3>Parent</h3>
                    <p>Monitor your child's progress</p>
                </div>

                <!-- Staff -->
                <div class="role-card">
                    <div class="icon-circle staff">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <h3>Staff</h3>
                    <p>Manage and organize educational content</p>
                </div>
            </div>

            <button class="cta-button">
                Let's Check Up →
            </button>
        </div>

    </div>
</body>
</html>
