<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Platform – Choose Your Level</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/level_check_up.css"/>
</head>
<body>
  <div class="page-wrapper">
    <div class="blob blob-top-left"></div>
    <div class="blob blob-bottom-right"></div>

    <header class="site-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <span class="logo-text">Study<span class="logo-accent">Platform</span></span>
      </div>
      <p class="logo-tagline">Explore, Learn &amp; Achieve Your Goals</p>
    </header>

    <main class="card">
      <h1 class="card-title">Choose your level</h1>
      <p class="card-subtitle">Select the exam level you're preparing for</p>

      <div class="levels">

        <a href="dashboard.html" class="level-card" data-level="o-level">
          <div class="level-icon o-level-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2 2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="level-info">
            <span class="level-name">O-Level</span>
            <span class="level-desc">Ordinary Level examination track</span>
          </div>
          <div class="level-arrow">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

        <a href="dashboard.html" class="level-card" data-level="a-level">
          <div class="level-icon a-level-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </div>
          <div class="level-info">
            <span class="level-name">A-Level</span>
            <span class="level-desc">Advanced Level examination track</span>
          </div>
          <div class="level-arrow">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

      </div>
    </main>

    <footer class="site-footer">
      <p>© 2024 Study Platform. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
