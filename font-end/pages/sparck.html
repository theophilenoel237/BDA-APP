<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Creation</title>
  <style>
    :root{
      --gold:#FEF0AF;
      --blue-dark:#2B446C;
      --dark:#1D0D00;
      --white:#FDFDFD;
      --black:#000000;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:var(--white);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .box{
      width:100%;
      max-width:520px;
      background:var(--blue-dark);
      border:2px solid var(--black);
      border-radius:18px;
      padding:32px;
      color:var(--white);
      box-shadow:0 0 20px 20px var(--gold);
    }

    h2{
      margin-bottom:20px;
      font-size:28px;
      color:var(--gold);
      text-align:center;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:13px 14px;
      border:1px solid var(--black);
      border-radius:10px;
      background:var(--white);
      color:var(--black);
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    .subjects{
      background:rgba(255,255,255,0.12);
      border:1px solid var(--gold);
      border-radius:12px;
      padding:14px;
    }

    .subjects p{
      margin-bottom:12px;
      font-size:14px;
      color:var(--gold);
    }

    .subject-list{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px 18px;
    }

    .subject-item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
    }

    .subject-item input{
      width:auto;
    }

    button{
      padding:13px 16px;
      border:1px solid var(--black);
      border-radius:10px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s ease;
    }

    .submit-btn{
      background:var(--gold);
      color:var(--dark);
    }

    .submit-btn:hover{
      background:var(--black);
      color:var(--gold);
    }

    .note{
      font-size:13px;
      color:var(--gold);
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Account Creation</h2>

    <form id="accountForm">
      <label for="full-name">Complete Name</label>
      <input
        type="text"
        id="full-name"
        name="full-name"
        placeholder="Write your name as on the birth certificate"
        required
      >

      <label for="age">Age</label>
      <input type="number" id="age" name="age" min="1" required>

      <label for="series">Series</label>
      <select id="series" name="series" required>
        <option value="">Select series</option>
        <option value="science">Science</option>
        <option value="arts">Arts</option>
        <option value="commercial">Commercial</option>
        <option value="technical">Technical</option>
      </select>

      <label for="class">Class</label>
      <input type="text" id="class" name="class" required>

      <label for="school">School</label>
      <input type="text" id="school" name="school" required>

      <label for="address">Address</label>
      <textarea id="address" name="address" required></textarea>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <div class="subjects">
        <p>Choose minimum 2 and maximum 5 subjects</p>
        <div class="subject-list">
          <label class="subject-item"><input type="checkbox" name="subjects" value="Mathematics"> Mathematics</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="English"> English</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="Physics"> Physics</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="Chemistry"> Chemistry</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="Biology"> Biology</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="History"> History</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="Geography"> Geography</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="Economics"> Economics</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="Computer Science"> Computer Science</label>
          <label class="subject-item"><input type="checkbox" name="subjects" value="Literature"> Literature</label>
        </div>
      </div>

      <div class="note">All the information above is required.</div>

      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("accountForm");
    const subjectCheckboxes = document.querySelectorAll('input[name="subjects"]');

    subjectCheckboxes.forEach((checkbox) => {
      checkbox.addEventListener("change", () => {
        const checkedCount = document.querySelectorAll('input[name="subjects"]:checked').length;

        if (checkedCount > 5) {
          checkbox.checked = false;
          alert("You can choose maximum 5 subjects.");
        }
      });
    });

    form.addEventListener("submit", function (e) {
      const checkedCount = document.querySelectorAll('input[name="subjects"]:checked').length;

      if (checkedCount < 2 || checkedCount > 5) {
        e.preventDefault();
        alert("Choose minimum 2 and maximum 5 subjects.");
      }
    });
  </script>
</body>
</html>
