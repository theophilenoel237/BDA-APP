<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/sign-in.css">
    <title>Sign In</title>
    <style>

    </style>
  </head>
  <body>
    <div class="page-wrapper">
    <div class="blob blob-top-left"></div>
    <div class="blob blob-bottom-right"></div>

    <header class="site-header">
      <div class="logo">
        <div class="logo-icon">
          <img src="../images/BDA-logo.png" width="50px">
        </div>
        <span class="logo-text">BigDreamsStudy<span class="logo-accent">Platform</span></span>
      </div>
      <p class="logo-tagline">Explore, Learn &amp; Achieve Your Goals</p>
    </header>
    <div class="box">
      <h2>Sign In</h2>

      <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />

        <button type="submit" class="submit-btn">Submit</button>
        <a href="#" class="forgot-link">Forgot password</a>
        <button type="button" class="google-btn">
          Sign in with
          <span class="google-logo">
            <span class="blue">G</span>
            <span class="red">o</span>
            <span class="yellow">o</span>
            <span class="blue">g</span>
            <span class="green">l</span>
            <span class="red">e</span>
          </span>
        </button>
    
      </form>
      <div class="links">
        <a href="create-account.html">I don't have an account yet</a>
      </div>
    </div>
  </body>
</html>
