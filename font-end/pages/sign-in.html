<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    :root{
      --gold:#FEF0AF;
      --blue-dark:#2B446C;
      --dark:#1D0D00;
      --white:#FDFDFD;
      --black:#000000;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:var(--white);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .box {
        width: 100%;
        max-width: 420px;
        background: var(--blue-dark);
        border: 2px solid var(--black);
        border-radius: 18px;
        padding: 32px;
        color: var(--white);
        box-shadow: 0 0 20px 20px var(--gold);
    }
    h2{
      margin-bottom:20px;
      font-size:28px;
      color:var(--gold);
      text-align:center;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input{
      width:100%;
      padding:13px 14px;
      border:1px solid var(--black);
      border-radius:10px;
      background:var(--white);
      color:var(--black);
      font-size:15px;
      outline:none;
    }

    button{
      padding:13px 16px;
      border:1px solid var(--black);
      border-radius:10px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s ease;
    }

    .submit-btn{
      background:var(--gold);
      color:var(--dark);
    }

    .submit-btn:hover{
      background:var(--black);
      color:var(--gold);
    }

    .google-btn{
      background:var(--white);
      color:var(--black);
    }

    .google-btn:hover{
      background:var(--dark);
      color:var(--white);
    }

    .forgot-link{
      color:var(--gold);
      text-decoration:underline;
      font-size:14px;
      display:inline-block;
      text-align:center;
    }

    .links{
      margin-top:14px;
      text-align:center;
    }

    .links a{
      color:var(--gold);
      text-decoration:underline;
      font-size:14px;
      text-a

    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Sign In</h2>

    <form>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit" class="submit-btn">Submit</button>
      <a href="#" class="forgot-link">Forgot password</a>
      <button type="button" class="google-btn">Sign in with Google</button>
    </form>

    <div class="links">
      <a href="create-account.html">I don't have an account yet</a>
    </div>
  </div>
</body>
</html>
